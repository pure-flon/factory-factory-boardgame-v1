<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemeQuest — pure-flon.com</title>
<meta name="description" content="글로벌 밈 스무고개 게임 — 국가별 현지화 밈으로 즐기는 퀴즈">
<link rel="canonical" href="https://pure-flon.com/meme-quest/">
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --accent: #f78166; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 48px 40px; text-align: center; max-width: 420px; width: 90%; }
  .emoji { font-size: 56px; line-height: 1; margin-bottom: 16px; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .badge { display: inline-block; background: #1c2d1e; color: #56d364; border: 1px solid #2ea043; border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; margin-bottom: 16px; }
  p { color: var(--muted); font-size: 14px; line-height: 1.6; }
  .btn { display: inline-block; margin-top: 24px; padding: 12px 28px; background: var(--accent); color: #fff; border-radius: 6px; font-weight: 600; font-size: 15px; text-decoration: none; }
  .btn:hover { opacity: 0.85; }
  .home { display: block; margin-top: 16px; color: var(--muted); font-size: 13px; text-decoration: none; }
  .home:hover { color: var(--text); }
</style>
</head>
<body>
<div class="card">
  <div class="emoji">🃏</div>
  <h1>MemeQuest</h1>
  <span class="badge">COMING SOON</span>
  <p>글로벌 밈 스무고개 게임<br>국가별 현지화 밈으로 즐기는 AI 퀴즈</p>
  <!-- TODO: 배포 완료 후 아래 버튼 활성화 -->
  <!-- <a href="[MEME_QUEST_URL]" class="btn">지금 플레이 →</a> -->
  <a href="/" class="home">← 게임 포털로 돌아가기</a>
</div>
</body>
</html>
