<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="3;url=./">
<title>페이지를 찾을 수 없습니다 — pure-flon.com</title>
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 48px 40px; text-align: center; max-width: 420px; width: 90%; }
  .code { font-size: 72px; font-weight: 700; color: var(--accent); line-height: 1; }
  h1 { font-size: 20px; font-weight: 600; margin: 16px 0 8px; }
  p { color: var(--muted); font-size: 14px; line-height: 1.6; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .btn { display: inline-block; margin-top: 24px; padding: 10px 24px; background: var(--accent); color: #0d1117; border-radius: 6px; font-weight: 600; font-size: 14px; }
  .btn:hover { opacity: 0.85; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="code">404</div>
  <h1>페이지를 찾을 수 없습니다</h1>
  <p>요청한 경로가 존재하지 않습니다.<br>3초 후 메인 페이지로 이동합니다.</p>
  <a href="./" class="btn">메인으로 돌아가기</a>
</div>
</body>
</html>
