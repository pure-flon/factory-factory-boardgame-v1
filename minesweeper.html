<body>

<h1>💣 Minesweeper</h1>
<p class="subtitle">보드게임 컬렉션 #4 — 지뢰찾기</p>

<!-- Difficulty -->
<div class="diff-bar">
  <button class="diff-btn active" data-diff="beginner">초급 (9×9)</button>
  <button class="diff-btn" data-diff="intermediate">중급 (16×16)</button>
  <button class="diff-btn" data-diff="expert">고급 (30×16)</button>

<!-- Status bar -->
<div class="status-bar">
  <div class="stat">
    <div class="stat-val" id="mine-count">10</div>
    <div class="stat-lbl">💣 지뢰</div>
  </div>
  <button id="reset-btn" title="새 게임" aria-label="새 게임 시작">🙂</button>
  <div class="stat">
    <div class="stat-val" id="timer">0</div>
    <div class="stat-lbl">⏱ 초</div>
  </div>
</div>

<!-- Grid -->
<div class="grid-wrap">
  <div id="grid"></div>
</div>

<p class="mobile-hint">📱 길게 누르기 = 깃발 설치 / 제거</p>

<!-- Result overlay -->
<div class="result-overlay" id="result-overlay">
  <div class="result-card">
    <div class="result-icon" id="result-icon">😎</div>
    <div class="result-title" id="result-title">승리!</div>
    <div class="result-msg" id="result-msg">모든 지뢰를 찾았습니다!</div>
    <button class="play-again-btn" id="play-again-btn">다시 하기</button>
  </div>

<script>
// ─── Config ────────────────────────────────────────────────────────────────
const DIFFICULTIES = {
  beginner:     { rows: 9,  cols: 9,  mines: 10 },
  intermediate: { rows: 16, cols: 16, mines: 40 },
  expert:       { rows: 16, cols: 30, mines: 99 },
};

// ─── State ─────────────────────────────────────────────────────────────────
let cfg = DIFFICULTIES.beginner;
let board = [];      // 2D array of cell objects
let gameState = 'idle'; // idle | playing | won | lost
let firstClick = true;
let timerInterval = null;
let elapsed = 0;
let flagCount = 0;

// Cell shape: { mine, revealed, flagged, adj }

// ─── DOM refs ──────────────────────────────────────────────────────────────
const gridEl      = document.getElementById('grid');
const mineCountEl = document.getElementById('mine-count');
const timerEl     = document.getElementById('timer');
const resetBtn    = document.getElementById('reset-btn');
const overlay     = document.getElementById('result-overlay');
const resultIcon  = document.getElementById('result-icon');
const resultTitle = document.getElementById('result-title');
const resultMsg   = document.getElementById('result-msg');
const playAgainBtn= document.getElementById('play-again-btn');

// ─── Init ──────────────────────────────────────────────────────────────────
function initBoard() {
  stopTimer();
  gameState = 'idle';
  firstClick = true;
  elapsed = 0;
  flagCount = 0;
  timerEl.textContent = '0';
  mineCountEl.textContent = cfg.mines;
  resetBtn.textContent = '🙂';
  overlay.classList.remove('show');

  board = Array.from({ length: cfg.rows }, () =>
    Array.from({ length: cfg.cols }, () => ({
      mine: false, revealed: false, flagged: false, adj: 0
    }))
  );
  renderGrid();
}

function placeMines(safeR, safeC) {
  const excluded = new Set();
  // Safe zone: 3×3 around first click
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      const r = safeR + dr, c = safeC + dc;
      if (r >= 0 && r < cfg.rows && c >= 0 && c < cfg.cols)
        excluded.add(r * cfg.cols + c);
    }
  }
  const all = [];
  for (let i = 0; i < cfg.rows * cfg.cols; i++) {
    if (!excluded.has(i)) all.push(i);
  }
  shuffle(all);
  for (let i = 0; i < cfg.mines; i++) {
    const idx = all[i];
    board[Math.floor(idx / cfg.cols)][idx % cfg.cols].mine = true;
  }
  // Compute adjacency
  for (let r = 0; r < cfg.rows; r++) {
    for (let c = 0; c < cfg.cols; c++) {
      if (board[r][c].mine) continue;
      board[r][c].adj = neighbors(r, c).filter(([nr,nc]) => board[nr][nc].mine).length;
    }
  }
}

// ─── Render ────────────────────────────────────────────────────────────────
function renderGrid() {
  gridEl.style.gridTemplateColumns = `repeat(${cfg.cols}, 34px)`;
  gridEl.innerHTML = '';
  for (let r = 0; r < cfg.rows; r++) {
    for (let c = 0; c < cfg.cols; c++) {
      const el = document.createElement('div');
      el.className = 'cell hidden';
      el.dataset.r = r;
      el.dataset.c = c;
      el.addEventListener('click', onLeftClick);
      el.addEventListener('contextmenu', onRightClick);
      // Mobile long-press
      setupLongPress(el, r, c);
      gridEl.appendChild(el);
    }
  }
}

function renderCell(r, c) {
  const cell = board[r][c];
  const el = getCellEl(r, c);
  if (!el) return;

  el.className = 'cell';
  el.textContent = '';

  if (cell.flagged && !cell.revealed) {
    el.classList.add('flagged');
    el.textContent = '🚩';
  } else if (!cell.revealed) {
    el.classList.add('hidden');
  } else if (cell.mine) {
    el.classList.add('mine-hit');
    el.textContent = '💥';
  } else {
    el.classList.add('revealed');
    if (cell.adj > 0) {
      el.textContent = cell.adj;
      el.classList.add('n' + cell.adj);
    }
  }
}

function getCellEl(r, c) {
  return gridEl.querySelector(`[data-r="${r}"][data-c="${c}"]`);
}

// ─── Input handlers ────────────────────────────────────────────────────────
function onLeftClick(e) {
  const r = +e.currentTarget.dataset.r;
  const c = +e.currentTarget.dataset.c;
  handleReveal(r, c);
}

function onRightClick(e) {
  e.preventDefault();
  const r = +e.currentTarget.dataset.r;
  const c = +e.currentTarget.dataset.c;
  handleFlag(r, c);
}

// Long-press for mobile (flag)
function setupLongPress(el, r, c) {
  let timer = null;
  let moved = false;

  el.addEventListener('touchstart', (e) => {
    moved = false;
    timer = setTimeout(() => {
      if (!moved) handleFlag(r, c);
    }, 500);
  }, { passive: true });

  el.addEventListener('touchmove', () => {
    moved = true;
    if (timer) { clearTimeout(timer); timer = null; }
  }, { passive: true });

  el.addEventListener('touchend', () => {
    if (timer) { clearTimeout(timer); timer = null; }
  }, { passive: true });
}

// ─── Game logic ────────────────────────────────────────────────────────────
function handleReveal(r, c) {
  if (gameState === 'won' || gameState === 'lost') return;
  const cell = board[r][c];
  if (cell.revealed || cell.flagged) return;

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    gameState = 'playing';
    startTimer();
  }

  revealCell(r, c);
  checkWin();
}

function revealCell(r, c) {
  const cell = board[r][c];
  if (cell.revealed || cell.flagged) return;
  cell.revealed = true;
  renderCell(r, c);

  // Pop animation
  const el = getCellEl(r, c);
  if (el) { el.classList.add('pop'); setTimeout(() => el.classList.remove('pop'), 150); }

  if (cell.mine) {
    // Hit a mine
    triggerLoss(r, c);
    return;
  }

  // Auto-expand: if adj = 0, reveal all neighbors
  if (cell.adj === 0) {
    neighbors(r, c).forEach(([nr, nc]) => revealCell(nr, nc));
  }
}

function handleFlag(r, c) {
  if (gameState === 'won' || gameState === 'lost') return;
  if (gameState === 'idle') return; // Can't flag before first click
  const cell = board[r][c];
  if (cell.revealed) return;

  if (cell.flagged) {
    cell.flagged = false;
    flagCount--;
  } else {
    cell.flagged = true;
    flagCount++;
  }
  mineCountEl.textContent = cfg.mines - flagCount;
  renderCell(r, c);
}

function checkWin() {
  const total = cfg.rows * cfg.cols;
  const revealedSafe = board.flat().filter(c => c.revealed && !c.mine).length;
  if (revealedSafe === total - cfg.mines) {
    gameState = 'won';
    stopTimer();
    resetBtn.textContent = '😎';
    // Flag remaining mines
    for (let r = 0; r < cfg.rows; r++) {
      for (let c = 0; c < cfg.cols; c++) {
        if (board[r][c].mine && !board[r][c].flagged) {
          board[r][c].flagged = true;
          renderCell(r, c);
        }
      }
    }
    mineCountEl.textContent = '0';
    showResult(true, elapsed);
  }
}

function triggerLoss(hitR, hitC) {
  gameState = 'lost';
  stopTimer();
  resetBtn.textContent = '😵';

  // Reveal all mines; mark wrong flags
  for (let r = 0; r < cfg.rows; r++) {
    for (let c = 0; c < cfg.cols; c++) {
      const cell = board[r][c];
      if (cell.mine && !cell.flagged) {
        cell.revealed = true;
        const el = getCellEl(r, c);
        if (el) {
          el.className = 'cell mine-show';
          el.textContent = '💣';
        }
      } else if (!cell.mine && cell.flagged) {
        const el = getCellEl(r, c);
        if (el) {
          el.className = 'cell wrong-flag';
          el.textContent = '❌';
        }
      }
    }
  }
  // Highlight the clicked mine
  const el = getCellEl(hitR, hitC);
  if (el) { el.className = 'cell mine-hit'; el.textContent = '💥'; }

  showResult(false, elapsed);
}

// ─── Result overlay ────────────────────────────────────────────────────────
function showResult(won, time) {
  resultIcon.textContent  = won ? '🎉' : '💥';
  resultTitle.textContent = won ? '승리!' : '폭발!';
  resultMsg.textContent   = won
    ? `${time}초 만에 모든 지뢰를 찾았습니다!`
    : '지뢰를 밟았습니다. 다시 도전하세요!';
  overlay.classList.add('show');
}

// ─── Timer ─────────────────────────────────────────────────────────────────
function startTimer() {
  elapsed = 0;
  timerEl.textContent = '0';
  timerInterval = setInterval(() => {
    elapsed++;
    timerEl.textContent = elapsed;
    if (elapsed >= 999) stopTimer();
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ─── Helpers ────────────────────────────────────────────────────────────────
function neighbors(r, c) {
  const result = [];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < cfg.rows && nc >= 0 && nc < cfg.cols)
        result.push([nr, nc]);
    }
  }
  return result;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ─── Controls ──────────────────────────────────────────────────────────────
resetBtn.addEventListener('click', initBoard);
playAgainBtn.addEventListener('click', () => { overlay.classList.remove('show'); initBoard(); });

// Difficulty buttons
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    cfg = DIFFICULTIES[btn.dataset.diff];
    initBoard();
  });
});

// ─── Boot ──────────────────────────────────────────────────────────────────
initBoard();
</script>
