<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ops Dashboard — pure-flon.com</title>
<meta name="description" content="Factory 운영 대시보드 — 광고·커머스·고객·실험 통합 모니터링">
<link rel="canonical" href="https://pure-flon.com/opsdash/">
<meta name="robots" content="noindex, nofollow">
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 48px 40px; text-align: center; max-width: 420px; width: 90%; }
  .emoji { font-size: 56px; line-height: 1; margin-bottom: 16px; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .badge { display: inline-block; background: #1c2427; color: var(--accent); border: 1px solid #1f6feb; border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; margin-bottom: 16px; }
  p { color: var(--muted); font-size: 14px; line-height: 1.6; }
  .home { display: block; margin-top: 24px; color: var(--muted); font-size: 13px; text-decoration: none; }
  .home:hover { color: var(--text); }
</style>
</head>
<body>
<div class="card">
  <div class="emoji">📊</div>
  <h1>Ops Dashboard</h1>
  <span class="badge">INTERNAL</span>
  <p>Factory 운영 대시보드<br>광고·커머스·고객·실험 통합 모니터링</p>
  <!-- Dashboard Sprint 1 완료 후 배포 -->
  <a href="/" class="home">← 게임 포털로 돌아가기</a>
</div>
</body>
</html>
